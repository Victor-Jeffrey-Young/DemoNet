services:
  mysql:
    image: mariadb:11
    container_name: demonet-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 .env 中设置 MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: demonet
    # 生产环境不暴露 MySQL 端口，仅通过 Docker 内部网络通信（审计报告 SEC-3）
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: demonet-redis
    restart: always
    # 生产环境不暴露 Redis 端口（审计报告 SEC-3）
    command: redis-server --requirepass ${REDIS_PASSWORD:?请在 .env 中设置 REDIS_PASSWORD}

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: demonet-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?请在 .env 中设置 RABBITMQ_PASS}
    # 生产环境不暴露 RabbitMQ 端口（审计报告 SEC-3）

  backend:
    build: ./backend
    container_name: demonet-backend
    restart: always
    depends_on:
      - mysql
      - redis
      - rabbitmq
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/demonet?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 .env 中设置 MYSQL_ROOT_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:?请在 .env 中设置 REDIS_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-admin}
      APP_JWT_SECRET: ${JWT_SECRET:?请在 .env 中设置 JWT_SECRET}
      APP_TMDB_API_KEY: ${TMDB_API_KEY:-}
      APP_STEAM_API_KEY: ${STEAM_API_KEY:-}
      APP_IGDB_CLIENT_ID: ${IGDB_CLIENT_ID:-}
      APP_IGDB_CLIENT_SECRET: ${IGDB_CLIENT_SECRET:-}
      APP_STEAMGRIDDB_API_KEY: ${STEAMGRIDDB_API_KEY:-}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:?请在 .env 中设置 ADMIN_DEFAULT_PASSWORD}
    # 生产环境持久化 uploads 和 logs，避免容器重启丢失文件（审计报告 ARCH-5）
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs

  frontend:
    build: ./frontend
    container_name: demonet-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads:
  logs:
