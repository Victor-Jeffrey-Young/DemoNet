services:
  mysql:
    image: mariadb:11
    container_name: demonet-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: demonet
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  redis:
    image: redis:7-alpine
    container_name: demonet-redis
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: demonet-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-changeme}
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build: ./backend
    container_name: demonet-backend
    restart: always
    depends_on:
      - mysql
      - redis
      - rabbitmq
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/demonet?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      SPRING_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      APP_JWT_SECRET: ${JWT_SECRET:-changeme}
      APP_TMDB_API_KEY: ${TMDB_API_KEY:-}
      APP_STEAM_API_KEY: ${STEAM_API_KEY:-}
      APP_IGDB_CLIENT_ID: ${IGDB_CLIENT_ID:-}
      APP_IGDB_CLIENT_SECRET: ${IGDB_CLIENT_SECRET:-}

  frontend:
    build: ./frontend
    container_name: demonet-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
