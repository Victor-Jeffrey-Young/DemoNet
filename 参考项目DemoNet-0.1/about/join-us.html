<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>DemoNet：加入我们</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/jquery-3.2.1.min.js"></script>
    <script src="../js/bootstrap.min.js"></script>
    <script src="../js/app.js"></script>
</head>
<body>
    <div id="nav-placeholder"></div>
    <br><br>
    <div class="container">
        <div class="shadow p-3 mb-5 bg-white">
            <p class="bg-danger text-white text-center">招聘表单</p>
            <hr>
            <form>
                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <span class="input-group-text">姓名</span>
                    </div>
                    <input type="text" class="form-control" placeholder="姓氏">
                    <input type="text" class="form-control" placeholder="名字">
                </div>
                <label for="sel2">应聘岗位</label>
                <div>
                    <select class="form-control" id="sel2">
                        <option>Web开发工程师</option>
                        <option>技术美术</option>
                        <option>内容运营</option>
                        <option>版权管理</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="comment">简单描述:</label>
                    <textarea class="form-control" rows="5" id="comment" placeholder="请输入简要自己"></textarea>
                </div>
                <div class="input-group mb-3 input-group-sm">
                    <div class="input-group-prepend">
                        <span class="input-group-text">特长</span>
                    </div>
                    <input type="text" class="form-control">
                </div>
                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <div class="input-group-text">
                            <input type="checkbox">
                        </div>
                    </div>
                    <input type="text" class="form-control" placeholder="是否有工作经验，具体几年">
                </div>
                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <div class="input-group-text">
                            <input type="radio">
                        </div>
                    </div>
                    <input type="text" class="form-control" placeholder="是否获得相关竞赛奖项，简要描述">
                </div>
                <div class="form-group">
                    <label for="email">邮箱:</label>
                    <input type="email" class="form-control" id="email" placeholder="请输入邮箱地址">
                </div>
                <div class="form-group">
                    <label for="phone">联系电话:</label>
                    <input type="tel" class="form-control" id="phone" placeholder="请输入联系电话">
                </div>
                <p class="form-control-static">请提供真实信息</p>
                <div class="form-check">
                    <label class="form-check-label">
                        <input class="form-check-input" type="checkbox">保存
                    </label>
                </div>
                <button type="submit" class="btn btn-primary">提交</button>
            </form>
        </div>
    </div>
    <div id="footer-placeholder"></div>
    <script>
        DemoNet.renderNav({ activeKey: 'about', brandText: 'DemoNet：加入我们', style: 'dark', showSearch: false });
        DemoNet.renderFooter();
    </script>
</body>
</html>
