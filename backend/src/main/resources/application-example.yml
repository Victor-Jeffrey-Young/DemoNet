# =============================================================================
# DemoNet 应用配置模板
# =============================================================================
# 使用方式：复制此文件为 application.yml 并按需修改
#   cp backend/src/main/resources/application-example.yml backend/src/main/resources/application.yml
#
# 所有敏感值均通过环境变量注入，默认值为占位符。
# 生产环境请务必通过环境变量或外部配置覆盖以下所有以 changeme 标记的值。
# =============================================================================

spring:
  application:
    name: DemoNet
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/demonet?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    # ⚠️ 修改为你本机 MySQL 的 root 密码，或通过环境变量 MYSQL_PASSWORD 设置
    password: ${MYSQL_PASSWORD:changeme}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      # 与 application.yml 保持一致（审计报告 ARCH-6）
      max-file-size: 10MB
      max-request-size: 10MB
  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:admin}
    # ⚠️ 修改为你本机 RabbitMQ 的密码，或通过环境变量 RABBITMQ_PASS 设置
    password: ${RABBITMQ_PASS:changeme}

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    # ⚠️ 生产环境请务必使用一个足够长且随机的字符串（至少 256 位）
    secret: ${JWT_SECRET:changeme}
    expiration: 86400000
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  steam:
    # Steam API Key（可选，不使用 Steam 抓取功能可不填）
    api-key: ${STEAM_API_KEY:}
  tmdb:
    # ⚠️ TMDB API Key，从 https://www.themoviedb.org/settings/api 获取
    api-key: ${TMDB_API_KEY:}
