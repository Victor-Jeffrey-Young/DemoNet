spring:
  application:
    name: DemoNet
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/demonet?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:changeme}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 2
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASS:changeme}
    listener:
      simple:
        prefetch: 5
        retry:
          enabled: true
          max-attempts: 3

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: ${JWT_SECRET:T6KWuFG5rTmj5H1VD8sTqDrxn520O4Xqc83KYR5lTNP+IKt+BaeXpaDcp+3kbzslBdB5EjZ/cqXOxkFS4QvnvA==}
    expiration: 86400000
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  steam:
    api-key: ${STEAM_API_KEY:}
  tmdb:
    api-key: ${TMDB_API_KEY:}
  igdb:
    client-id: ${IGDB_CLIENT_ID:}
    client-secret: ${IGDB_CLIENT_SECRET:}
  steamgriddb:
    api-key: ${STEAMGRIDDB_API_KEY:}
