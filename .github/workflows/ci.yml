# =============================================================================
# DemoNet CI — 代码提交 / PR 验证
# =============================================================================
# 每次 push 到 main 或提交 PR 时执行：
#   1. 后端编译 + 集成测试（MySQL + Redis 容器）
#   2. 前端构建（Vue 3 + Vite + pnpm）
#   3. 产出构建产物供 docker-build 工作流使用
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'
  PNPM_VERSION: '11.10.0'

# 同分支新推送取消旧运行
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # 后端编译 + 集成测试
  # ===========================================================================
  后端测试:
    name: 🧪 后端测试
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: citest
          MYSQL_DATABASE: demonet
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pcitest --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      MYSQL_HOST: localhost
      MYSQL_USER: root
      MYSQL_PASSWORD: citest
      REDIS_HOST: localhost
      JWT_SECRET: ci-test-jwt-secret-for-ci-please-override-256bit-min-here
      ADMIN_DEFAULT_PASSWORD: citest
      SPRING_FLYWAY_ENABLED: 'true'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: 等待 MySQL 就绪
        run: |
          echo "等待 MySQL 接受连接..."
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -pcitest --silent 2>/dev/null; then
              echo "MySQL 已就绪"
              break
            fi
            echo "  尝试 $i/30..."
            sleep 2
          done

      - name: 运行测试
        working-directory: backend
        run: mvn -B -ntp test -Pci
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: 打包 JAR（跳过测试，产物用于 docker-build）
        working-directory: backend
        run: mvn -B -ntp package -DskipTests -Dskip.installnodenpm -Dmaven.test.skip=true

      - name: 上传 JAR 产物
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7
          if-no-files-found: error

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 后端测试报告
          path: backend/target/surefire-reports/
          retention-days: 14

  # ===========================================================================
  # 前端构建
  # ===========================================================================
  前端构建:
    name: 🎨 前端构建
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 安装 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: 安装依赖
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: 构建
        working-directory: frontend
        run: pnpm build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 前端产物
          path: frontend/dist/
          retention-days: 7
          if-no-files-found: error
