# =============================================================================
# DemoNet CI — Pull Request / Push 验证
# =============================================================================
# 每次 push 到 main 或 PR 时运行：
#   1. 编译后端 + 单元测试
#   2. 编译前端
#   3. 集成测试（需要 MySQL + Redis 服务）
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: -Dmaven.test.failure.ignore=false
  TZ: Asia/Shanghai

jobs:
  # ========== 后端测试 ==========
  backend-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: demonet_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -uroot -ptestpass"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysql -h127.0.0.1 -uroot -ptestpass -e "SELECT 1" 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            sleep 2
          done

      - name: Create application-test.yml
        working-directory: backend
        run: |
          cat > src/test/resources/application-test.yml << 'EOF'
          spring:
            datasource:
              url: jdbc:mysql://localhost:3306/demonet_test?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
              username: root
              password: testpass
            redis:
              host: localhost
              port: 6379
            rabbitmq:
              host: localhost
              port: 5672
          app:
            jwt:
              secret: test-secret-key-for-ci-at-least-256-bits-long
              expiration: 86400000
          EOF

      - name: Run Unit + Integration Tests
        working-directory: backend
        run: mvn clean test -Pci
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: backend/target/surefire-reports/
          retention-days: 7

  # ========== 前端构建 ==========
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload dist
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ========== 结果总览 ==========
  result:
    if: always()
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "## CI 结果" >> $GITHUB_STEP_SUMMARY
          echo "| Job | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Backend Tests | ${{ needs.backend-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎨 Frontend Build | ${{ needs.frontend-build.result }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.backend-test.result }}" != "success" ]; then
            exit 1
          fi
