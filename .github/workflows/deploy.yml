# =============================================================================
# DemoNet 自动部署
# =============================================================================
# 手动触发（workflow_dispatch），将最新镜像部署到生产服务器。
# 前提条件：
#   1. 服务器的 .env 已配置好所有密钥
#   2. 服务器已通过 SSH 密钥授权
#   3. GHCR 镜像已构建完成（用 docker-build.yml）
#
# 使用方式：
#   GitHub → Actions → Deploy → Run workflow → 选择目标环境
# =============================================================================
name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 部署目标环境
        type: choice
        options:
          - production
          - staging
        default: production
        required: true
      image_tag:
        description: 镜像标签（默认 latest）
        type: string
        default: latest
        required: false

concurrency:
  group: deploy-${{ github.ref_name }}-${{ inputs.environment || 'production' }}
  cancel-in-progress: false  # 部署不应取消正在进行的部署

env:
  REGISTRY_OWNER: ${{ github.repository_owner }}
  IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
  DEPLOY_ENV: ${{ inputs.environment || 'production' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_SSH_HOST_KEY || '' }}" > ~/.ssh/known_hosts || true
          cat >> ~/.ssh/config << 'EOF'
          Host demonet-server
            HostName ${{ secrets.DEPLOY_HOST }}
            Port ${{ secrets.DEPLOY_PORT || 22 }}
            User ${{ secrets.DEPLOY_USER || 'deploy' }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
          EOF

      - name: Deploy via SSH
        run: |
          ssh demonet-server << 'DEPLOY_SCRIPT'
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/opt/demonet' }}

            # 拉取最新镜像
            docker compose -f docker-compose.ci.yml pull

            # 重启服务（零停机滚动重启）
            docker compose -f docker-compose.ci.yml up -d --no-deps --pull always backend
            docker compose -f docker-compose.ci.yml up -d --no-deps --pull always frontend

            # 清理旧镜像
            docker image prune -f

            echo "✅ 部署完成: $DEPLOY_ENV / $IMAGE_TAG"
          DEPLOY_SCRIPT
        env:
          DEPLOY_ENV: ${{ env.DEPLOY_ENV }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Health Check
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.DEPLOY_DOMAIN || 'localhost' }}/api/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, waiting..."
            sleep 10
          done
          echo "❌ Health check failed after 2 minutes"
          exit 1

      - name: Deploy result
        run: |
          echo "## 🚀 部署结果" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 环境 | ${{ env.DEPLOY_ENV }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像标签 | ${{ env.IMAGE_TAG }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 服务 | backend + frontend |" >> $GITHUB_STEP_SUMMARY
