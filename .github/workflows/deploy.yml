# =============================================================================
# DemoNet 自动部署
# =============================================================================
# 手动触发（workflow_dispatch），或由 docker-build 完成后自动触发。
# 前置条件：
#   1. 仓库 Settings → Secrets 配置：DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY / DEPLOY_PATH
#   2. 仓库 Settings → Variables 设置 ENABLE_DEPLOY=true
#   3. 服务器已安装 Docker + Docker Compose，已克隆仓库并配置 .env
#   4. 服务器已 docker login ghcr.io（或镜像设为公开）
# =============================================================================
name: 部署

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["构建 Docker 镜像"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: 🚀 部署到生产
    if: >-
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')) &&
      vars.ENABLE_DEPLOY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 生成镜像标签
        id: vars
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 拉取最新镜像（预热缓存）
        run: |
          docker pull ghcr.io/${{ steps.vars.outputs.owner }}/demonet-frontend:latest || true
          docker pull ghcr.io/${{ steps.vars.outputs.owner }}/demonet-backend:latest || true

      - name: SSH 部署到服务器
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || '22' }}
          envs: DEPLOY_PATH
          script: |
            set -e
            echo "===== 开始部署 ====="
            date -u

            cd "$DEPLOY_PATH"

            echo "拉取最新代码（同步 docker-compose.ci.yml）..."
            git fetch --all
            git reset --hard origin/main

            echo "拉取最新镜像..."
            docker compose -f docker-compose.ci.yml pull

            echo "重启服务..."
            docker compose -f docker-compose.ci.yml up -d --remove-orphans

            echo "清理旧镜像..."
            docker image prune -f

            echo "===== 部署完成 ====="
            echo "当前运行容器："
            docker compose -f docker-compose.ci.yml ps

      - name: 输出部署结果
        run: |
          echo "## 🚀 部署完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 目标服务器 | \`${{ secrets.DEPLOY_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 部署路径 | \`${{ secrets.DEPLOY_PATH }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 前端镜像 | \`ghcr.io/${{ steps.vars.outputs.owner }}/demonet-frontend:${{ steps.vars.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 后端镜像 | \`ghcr.io/${{ steps.vars.outputs.owner }}/demonet-backend:${{ steps.vars.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
