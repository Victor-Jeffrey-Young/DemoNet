# =============================================================================
# DemoNet Docker 镜像构建 — 推送到 GHCR
# =============================================================================
# CI 通过后，复用已有构建产物打包 Docker 镜像并推送。
# 触发条件：
#   - main 分支代码推送
#   - 语义化版本标签（如 v1.2.3）
#
# 使用 .github/docker/Dockerfile.*（仅复制预构建产物，不重复编译）。
# =============================================================================
name: 构建 Docker 镜像

on:
  push:
    branches: [main]
    tags: [v*]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  docker-build:
    name: 🐳 构建镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像标签
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      # ---- 前端镜像 ----
      - name: 下载前端构建产物
        uses: actions/download-artifact@v4
        with:
          name: 前端产物
          path: frontend/dist

      - name: 验证前端产物
        run: |
          ls -lh frontend/dist/
          test -d frontend/dist && echo "前端产物就绪"

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: .github/docker/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/demonet-frontend:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/demonet-frontend:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          provenance: false

      # ---- 后端镜像 ----
      - name: 下载后端 JAR 产物
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-jar-download

      - name: 准备 JAR
        run: |
          mkdir -p backend/target
          cp backend-jar-download/*.jar backend/target/app.jar
          ls -lh backend/target/app.jar

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v6
        with:
          context: backend/target
          file: .github/docker/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/demonet-backend:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/demonet-backend:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          provenance: false

      # ---- 结果通知 ----
      - name: 输出构建结果
        run: |
          echo "## 🐳 Docker 镜像构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | 标签 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`demonet-frontend\` | \`latest\`, \`${{ steps.meta.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`demonet-backend\` | \`latest\`, \`${{ steps.meta.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "镜像已推送到 \`ghcr.io/${{ github.repository }}\`" >> $GITHUB_STEP_SUMMARY
