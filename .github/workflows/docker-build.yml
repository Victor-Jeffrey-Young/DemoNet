# =============================================================================
# DemoNet Docker 镜像构建 — 推送到 GHCR
# =============================================================================
# 自包含构建，不从其他工作流下载产物（GitHub Actions 无法跨工作流共享）。
# 触发条件：push → main 或语义化版本标签。
# =============================================================================
name: 构建 Docker 镜像

on:
  push:
    branches: [main]
    tags: [v*]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'
  PNPM_VERSION: '11.10.0'
  REGISTRY: ghcr.io

jobs:
  docker-build:
    name: 🐳 构建镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像标签
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      # ---- 后端：编译 + 打包 JAR ----
      - name: 安装 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: 打包后端 JAR
        working-directory: backend
        run: mvn -B -ntp package -DskipTests

      - name: 准备后端 JAR
        run: |
          cp backend/target/*.jar backend/target/app.jar
          ls -lh backend/target/app.jar

      # ---- 前端：安装依赖 + 构建 ----
      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 安装 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: 安装前端依赖
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: 构建前端
        working-directory: frontend
        run: pnpm build

      - name: 验证前端产物
        run: |
          ls -lh frontend/dist/
          test -d frontend/dist && echo "前端产物就绪"

      # ---- Docker 构建 ----
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: .github/docker/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/demonet-frontend:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/demonet-frontend:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          provenance: false

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v6
        with:
          context: backend/target
          file: .github/docker/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/demonet-backend:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/demonet-backend:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          provenance: false

      # ---- 结果通知 ----
      - name: 输出构建结果
        run: |
          echo "## 🐳 Docker 镜像构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | 标签 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`demonet-frontend\` | \`latest\`, \`${{ steps.meta.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`demonet-backend\` | \`latest\`, \`${{ steps.meta.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
