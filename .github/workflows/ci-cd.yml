# =============================================================================
# DemoNet CI/CD 工作流
# =============================================================================
# 三阶段流水线：构建 → 测试 → 部署
#
# 触发条件：
#   - 推送到 main 分支（构建 + 测试 + 部署）
#   - 向 main 发起 Pull Request（构建 + 测试，不部署）
#   - 手动触发（workflow_dispatch）
#
# 流水线结构：
#   1. frontend-build  ─┐
#   2. backend-build   ─┤  并行执行，产出可部署产物
#                       │
#   3. backend-test    ─┘  依赖 backend-build，用 MySQL/Redis/RabbitMQ 跑集成测试
#
#   4. deploy            依赖 frontend-build + backend-test，仅 main 分支推送时执行
#                        构建 Docker 镜像 → 推送 GHCR → SSH 部署到服务器
#
# 缓存策略：
#   - Maven 本地仓库（~/.m2）按 pom.xml 哈希缓存
#   - pnpm store 按 pnpm-lock.yaml 哈希缓存
#   - Docker 构建层使用 GitHub Actions 缓存
#
# 详细说明见 document/16-CI-CD-GitHub-Actions.md
# =============================================================================
name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'document/**'
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'document/**'
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  PNPM_VERSION: '11.10.0'

# 同分支新推送取消旧运行；main 分支不取消，确保部署完整执行
concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ===========================================================================
  # 阶段 1：前端构建
  # ===========================================================================
  frontend-build:
    name: 构建前端 (Vue 3 + Vite)
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: 安装依赖
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: 构建
        working-directory: frontend
        run: pnpm build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
          if-no-files-found: error

  # ===========================================================================
  # 阶段 1：后端构建
  # ===========================================================================
  backend-build:
    name: 构建后端 (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: 构建打包（跳过测试）
        working-directory: backend
        run: mvn -B -ntp package -DskipTests

      - name: 上传 JAR 产物
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7
          if-no-files-found: error

  # ===========================================================================
  # 阶段 2：后端集成测试
  # ===========================================================================
  # 项目测试为 @SpringBootTest，需完整 Spring 上下文，依赖 MySQL / Redis / RabbitMQ。
  # Flyway 会在启动时自动执行迁移（建表 + 种子数据），因此测试可直接验证表结构。
  backend-test:
    name: 后端集成测试
    needs: backend-build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: citest
          MYSQL_DATABASE: demonet
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pcitest --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      rabbitmq:
        image: rabbitmq:3.12-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: admin
          RABBITMQ_DEFAULT_PASS: citest
        ports:
          - 5672:5672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

    env:
      # 指向 service container（GitHub Actions 通过 localhost 映射端口访问）
      MYSQL_HOST: localhost
      MYSQL_USER: root
      MYSQL_PASSWORD: citest
      REDIS_HOST: localhost
      RABBITMQ_HOST: localhost
      RABBITMQ_USER: admin
      RABBITMQ_PASS: citest
      # 测试专用 JWT 密钥（仅 CI，非生产）
      JWT_SECRET: ci-test-jwt-secret-not-for-production-please-override-256bit-min-here
      ADMIN_DEFAULT_PASSWORD: citest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: 等待 MySQL 完全就绪
        run: |
          echo "等待 MySQL 接受连接..."
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -pcitest --silent 2>/dev/null; then
              echo "MySQL 已就绪"
              break
            fi
            echo "  尝试 $i/30..."
            sleep 2
          done

      - name: 运行测试
        working-directory: backend
        run: mvn -B -ntp test

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/
          retention-days: 14

  # ===========================================================================
  # 阶段 3：部署（仅 main 分支推送，且显式启用部署时执行）
  # ===========================================================================
  # 前置条件：
  #   1. 仓库 Settings → Secrets 配置：DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY / DEPLOY_PATH
  #   2. 仓库 Settings → Variables 设置 ENABLE_DEPLOY=true
  #   3. 服务器已安装 Docker + Docker Compose，已克隆本仓库，已配置 .env
  #   4. 服务器已 docker login ghcr.io（用具 read:packages 权限的 PAT，或将镜像设为公开）
  deploy:
    name: 部署到生产
    needs: [frontend-build, backend-test]
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.ENABLE_DEPLOY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 准备镜像名（GHCR 要求小写）
        id: vars
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: 下载前端构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 下载后端 JAR 产物
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-jar-download

      - name: 重命名 JAR
        run: |
          mkdir -p backend/target
          cp backend-jar-download/*.jar backend/target/app.jar
          ls -lh backend/target/app.jar

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: .github/docker/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/demonet-frontend:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/demonet-frontend:${{ steps.vars.outputs.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v6
        with:
          context: backend/target
          file: .github/docker/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/demonet-backend:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/demonet-backend:${{ steps.vars.outputs.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: SSH 部署到服务器
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || '22' }}
          envs: DEPLOY_PATH
          script: |
            set -e
            cd "$DEPLOY_PATH"
            echo "拉取最新代码（同步 docker-compose.ci.yml）..."
            git fetch --all
            git reset --hard origin/main
            echo "拉取最新镜像..."
            docker compose -f docker-compose.ci.yml pull
            echo "重启服务..."
            docker compose -f docker-compose.ci.yml up -d --remove-orphans
            echo "清理旧镜像..."
            docker image prune -f
            echo "部署完成。当前运行容器："
            docker compose -f docker-compose.ci.yml ps
